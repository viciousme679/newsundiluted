<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Daily Reporter - Readers Page</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Georgia, serif;
        }
        
        body {
            background: #f5f5f5;
            color: #222;
            line-height: 1.6;
            transition: 0.3s;
        }
        
        /* =========================
   HEADER
========================= */
        
        header {
            background: #111827;
            color: white;
            padding: 10px 20px;
        }
        
        .header-container {
            max-width: 1200px;
            margin: auto;
            position: relative;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            min-height: 60px;
        }
        
        .header-container h1 {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        
        /* =========================
   NAVIGATION
========================= */
        
        .nav {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .dropdown {
            position: relative;
        }
        
        .dropbtn {
            background: white;
            color: #111827;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 45px;
            min-width: 180px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0, 0, 0, .15);
            z-index: 999;
        }
        
        .dropdown-content a {
            display: block;
            padding: 12px 15px;
            text-decoration: none;
            color: #111827;
        }
        
        .dropdown-content a:hover {
            background: #f3f4f6;
        }
        
        .dropdown:hover .dropdown-content {
            display: block;
        }
        
        /* =========================
   DARK MODE BUTTON
========================= */
        
        #darkModeBtn {
            border: none;
            background: white;
            color: #111827;
            width: 42px;
            height: 42px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
        }
        
        /* =========================
   HERO
========================= */
        
        .hero {
            background: white;
            text-align: center;
            padding: 18px 20px 25px;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .hero h2 {
            font-size: 1.5rem;
            margin: 0 0 8px;
        }
        
        .hero p {
            max-width: 650px;
            margin: auto;
            color: #6b7280;
            line-height: 1.6;
        }
        
        /* =========================
   DARK MODE
========================= */
        
        .dark-mode {
            background: #111827;
            color: white;
        }
        
        .dark-mode header,
        .dark-mode .hero {
            background: #1f2937;
            color: white;
        }
        
        .dark-mode .hero p {
            color: #d1d5db;
        }
        
        .dark-mode .dropdown-content {
            background: #1f2937;
        }
        
        .dark-mode .dropdown-content a {
            color: white;
        }
        
        .dark-mode .dropdown-content a:hover {
            background: #374151;
        }
        
        .dark-mode #darkModeBtn {
            background: #374151;
            color: white;
        }
        
        /* =========================
   MOBILE
========================= */
        
        @media (max-width: 768px) {
            
            .header-container {
                min-height: 55px;
            }
            
            .header-container h1 {
                font-size: 1.4rem;
            }
            
            .hero {
                padding: 12px 15px 20px;
            }
            
            .hero h2 {
                font-size: 1.2rem;
            }
        }
        
        html,
        body {
            height: 100%;
        }
        
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        .container {
            flex: 1;
        }
        
        .dark-mode .article-card p {
            color: #d1d5db !important;
        }
        
        footer {
            margin-top: auto;
            background: #111827;
            color: white;
            text-align: center;
            padding: 20px;
            width: 100%;
        }
        
        footer p {
            margin: 0;
            text-align: center;
        }
        
        /* =========================
   CONTENT AREA
========================= */
        
        .container {
            flex: 1;
            width: 100%;
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        /* =========================
   ARTICLES GRID
========================= */
        
        #articles-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }
        
        /* =========================
   ARTICLE CARD
========================= */
        
        .article-card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .08);
            transition: .3s;
        }
        
        .article-card:hover {
            transform: translateY(-4px);
        }
        
        .article-card h2 {
            margin-bottom: 10px;
            color: #111827;
        }
        
        .meta {
            color: #6b7280;
            margin-bottom: 15px;
            font-size: .9rem;
        }
        
        .news-image {
            width: 100%;
            height: 240px;
            object-fit: cover;
            border-radius: 10px;
            margin: 15px 0;
        }
        
        /* =========================
   BUTTONS
========================= */
        
        .read-btn {
            display: inline-block;
            background: #111827;
            color: white;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            margin-top: 10px;
        }
        
        .like-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
        }
        
        /* =========================
   SHARE MENU
========================= */
        
        .share-box {
            display: inline-block;
            position: relative;
            margin-left: 10px;
        }
        
        .share-btn {
            background: #111827;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .share-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 45px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            min-width: 150px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .15);
        }
        
        .share-menu button {
            width: 100%;
            border: none;
            background: white;
            padding: 12px;
            text-align: left;
            cursor: pointer;
        }
        
        /* =========================
   COMMENTS
========================= */
        
        .comments-section {
            margin-top: 20px;
            border-top: 1px solid #e5e7eb;
            padding-top: 15px;
        }
        
        .comments-section h3 {
            margin-bottom: 10px;
        }
        
        textarea {
            width: 100%;
            min-height: 90px;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            margin-top: 10px;
            resize: vertical;
        }
        
        .comment {
            background: #f3f4f6;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        
        /* =========================
   DARK MODE
========================= */
        
        .dark-mode .article-card {
            background: #1f2937;
        }
        
        .dark-mode .article-card h2 {
            color: white;
        }
        
        .dark-mode .meta {
            color: #d1d5db;
        }
        
        .dark-mode .comment {
            background: #374151;
        }
        
        .dark-mode textarea {
            background: #374151;
            color: white;
            border-color: #4b5563;
        }
        
        .dark-mode .share-menu {
            background: #1f2937;
        }
        
        .dark-mode .share-menu button {
            background: #1f2937;
            color: white;
        }
    </style>
</head>

<body>
    
    <!-- HEADER -->
    
    <header>
        
        <div class="header-container">
            
            <h1>The NewsUndiluted</h1>
            <nav class="nav">
                
                <div class="dropdown">
                    <button class="dropbtn">Menu ▼</button>
                    
                    <div class="dropdown-content">
                        <a href="index.html">Home</a>
                        <a href="about.html">About</a>
                        <a href="allarticles.html">News</a>
                        
                    </div>
                </div>
                <button id="darkModeBtn">
                    🌙
                </button>
            </nav>
        </div>
        
    </header>
    
    <!-- HERO -->
    
    <section class="hero">
        
        <h2>
            Independent Journalism That Matters
        </h2>
        
        <p>
            Stay informed with real stories and community reporting.
        </p>
        
    </section>
    
    <!-- CONTENT -->
    
    <div class="container">
        
        <main id="articles-container"></main>
        
    </div>
    
    <!-- FOOTER -->
    
    <footer>
        <p>&copy; 2026 NewsUndiluted</p>
    </footer>
    
    <script type="module">
        import { initializeApp }
        from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        
        import {
            getFirestore,
            collection,
            getDocs,
            doc,
            updateDoc
        }
        from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
        
        // FIREBASE CONFIG
        
        const firebaseConfig = {
            
            apiKey: "AIzaSyB06tEmKKCLeA8bOhTWb_wE08I8V-1DduM",
            
            authDomain: "sunraynews-5443b.firebaseapp.com",
            
            projectId: "sunraynews-5443b",
            
            storageBucket: "sunraynews-5443b.firebasestorage.app",
            
            messagingSenderId: "1061115545146",
            
            appId: "1:1061115545146:web:f3a70f1efb304637809703",
            
            measurementId: "G-3WT5TKZW27"
            
        };
        
        // INITIALIZE FIREBASE
        
        const app = initializeApp(firebaseConfig);
        
        const db = getFirestore(app);
        
        // HTML CONTAINER
        
        const container =
            document.getElementById("articles-container");
        
        // POSTS ARRAY
        
        let posts = [];
        
        // =========================
        // LOAD POSTS FROM FIREBASE
        // =========================
        
        async function loadPosts() {
            
            posts = [];
            
            const querySnapshot =
                await getDocs(collection(db, "posts"));
            
            querySnapshot.forEach((docSnap) => {
                
                posts.push({
                    
                    firebaseId: docSnap.id,
                    
                    ...docSnap.data()
                    
                });
                
            });
            
            display();
            
        }
        
        // =========================
        // DISPLAY POSTS
        // =========================
        
        function display() {
            
            let likedPosts =
                JSON.parse(
                    localStorage.getItem("likedPosts")
                ) || [];
            
            if (posts.length === 0) {
                
                container.innerHTML = `
<div class="article-card" style="
    text-align:center;
    padding:60px 30px;
">
    <h2 style="font-size:2rem;margin-bottom:10px;">
        📰 No Stories Published Yet
    </h2>

    <p style="
        color:#6b7280;
        max-width:500px;
        margin:auto;
    ">
        Our newsroom is preparing fresh stories and
        in-depth reporting. Check back soon for the
        latest news and updates.
    </p>
</div>
`;
                
                return;
                
            }
            
            container.innerHTML = "";
            
            posts.forEach(post => {
                
                let commentsHTML = "";
                
                post.comments =
                    post.comments || [];
                
                post.comments.forEach(c => {
                    
                    commentsHTML += `

            <div class="comment">

            ${c}

            </div>

            `;
                    
                });
                
                container.innerHTML += `

        <div class="article-card">

            <h2>${post.title}</h2>

            <p class="meta">

                ${post.date || ""}

                |

                ${post.author || "SunRayNEWS"}

            </p>

            <p>${post.excerpt || ""}</p>

            ${post.image ?

            `<img src="${post.image}"
            class="news-image">`

            : ""}

            <a href="story.html?slug=${post.slug}"
            class="read-btn">

                Read Story

            </a>

            <div class="share-box">

                <button class="share-btn"
                onclick="toggleShareMenu('${post.firebaseId}')">

                    ⋮

                </button>

                <div class="share-menu"
                id="share-menu-${post.firebaseId}">

                    <button
                    onclick=" copyLink('${post.slug}')">

                        🔗 Copy Link

                    </button>

                </div>

            </div>

            <br>

            <button class="like-btn"
            onclick="likePost('${post.firebaseId}')">

                ${likedPosts.includes(post.firebaseId)
                ? "💙 Liked"
                : "👍 Like"}

                (${post.likes || 0})

            </button>

            <div class="comments-section">

                <h3>Comments</h3>

                <div>${commentsHTML}</div>

                <textarea
                id="t-${post.firebaseId}"
                placeholder="Write comment">

                </textarea>

                <button
                onclick="commentPost('${post.firebaseId}')">

                    Post

                </button>

            </div>

        </div>

        `;
                
            });
            
        }
        
        // =========================
        // LIKE POST
        // =========================
        
        window.likePost = async function(id) {
            
            let likedPosts =
                JSON.parse(
                    localStorage.getItem("likedPosts")
                ) || [];
            
            let post =
                posts.find(p => p.firebaseId === id);
            
            if (!post) return;
            
            const ref = doc(db, "posts", id);
            
            if (likedPosts.includes(id)) {
                
                post.likes =
                    Math.max((post.likes || 1) - 1, 0);
                
                likedPosts =
                    likedPosts.filter(x => x !== id);
                
            } else {
                
                post.likes =
                    (post.likes || 0) + 1;
                
                likedPosts.push(id);
                
            }
            
            localStorage.setItem(
                "likedPosts",
                JSON.stringify(likedPosts)
            );
            
            await updateDoc(ref, {
                
                likes: post.likes
                
            });
            
            display();
            
        };
        
        // =========================
        // COMMENT
        // =========================
        
        window.commentPost = async function(id) {
            
            let input =
                document.getElementById("t-" + id);
            
            if (!input.value.trim()) return;
            
            let post =
                posts.find(p => p.firebaseId === id);
            
            if (!post.comments)
                post.comments = [];
            
            post.comments.push(input.value);
            
            const ref = doc(db, "posts", id);
            
            await updateDoc(ref, {
                
                comments: post.comments
                
            });
            
            input.value = "";
            
            display();
            
        };
        
        // =========================
        // SHARE MENU
        // =========================
        
        window.toggleShareMenu = function(id) {
            
            const menu =
                document.getElementById(
                    `share-menu-${id}`
                );
            
            document
                .querySelectorAll(".share-menu")
                .forEach(m => {
                    
                    if (m !== menu)
                        m.style.display = "none";
                    
                });
            
            menu.style.display =
                menu.style.display === "block" ?
                "none" :
                "block";
            
        };
        
        // =========================
        // COPY LINK
        // =========================
        
        window.copyLink = function(slug) {
            
            const link =
                window.location.origin +
                window.location.pathname.replace("index.html", "") +
                "story.html?slug=" +
                slug;
            
            navigator.clipboard.writeText(link);
            
            alert("Link copied!");
            
        };
        
        const darkBtn = document.getElementById("darkModeBtn");
        
        function applyTheme() {
            const mode = localStorage.getItem("darkMode");
            
            if (mode === "enabled") {
                document.body.classList.add("dark-mode");
                
                if (darkBtn) darkBtn.textContent = "☀️";
            } else {
                document.body.classList.remove("dark-mode");
                
                if (darkBtn) darkBtn.textContent = "🌙";
            }
        }
        
        applyTheme();
        
        if (darkBtn) {
            darkBtn.addEventListener("click", () => {
                
                if (document.body.classList.contains("dark-mode")) {
                    localStorage.setItem("darkMode", "disabled");
                } else {
                    localStorage.setItem("darkMode", "enabled");
                }
                
                applyTheme();
            });
        }
        
        // =========================
        // START
        // =========================
        
        loadPosts();
    </script>
    
</body>

</html>
